name: Rebuild all client sites

on:
  push:
    branches: [main]

jobs:
  rebuild-clients:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rebuild on all Cloudflare Pages projects
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e

          # Fetch all Pages projects (up to 100)
          projects=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            | jq -r '.result[].name')

          if [ -z "$projects" ]; then
            echo "No Pages projects found."
            exit 0
          fi

          echo "Projects to rebuild:"
          echo "$projects"

          failed=0
          skipped=0
          while IFS= read -r project; do
            echo ""
            echo "Triggering: $project"
            # Read each project's production branch from the API. Defaults
            # to "main" on lookup failure — every current client uses main.
            prod_branch=$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${project}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              | jq -r '.result.production_branch // "main"')
            echo "  Production branch: $prod_branch"

            # POST with explicit branch as multipart form data. Without an
            # explicit branch, CF can return 304 ("Not Modified") when the
            # production branch HEAD matches the most recent deployment —
            # which is exactly the case here, since smalltown-layouts pushes
            # don't move any client repo commits. Sending -F branch=<branch>
            # asks CF to redeploy that branch's current commit, which is
            # what we need so the build can pick up the new layouts via
            # 'git submodule update --remote layouts'.
            http_code=$(curl -s -o /tmp/cf_response.json -w '%{http_code}' -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${project}/deployments" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -F "branch=${prod_branch}")
            if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              deploy_id=$(jq -r '.result.id // empty' /tmp/cf_response.json)
              echo "  Deployment triggered: $deploy_id"
            elif [ "$http_code" = "304" ]; then
              # If 304 still occurs even with an explicit branch, treat it
              # as a soft skip rather than a hard failure so the workflow
              # doesn't go red and trigger noisy notifications for what is,
              # at worst, a missed rebuild. Logged so we can audit.
              echo "  Skipped (HTTP 304): CF declined to redeploy ${prod_branch}"
              skipped=$((skipped + 1))
            else
              echo "  Failed (HTTP $http_code): $(jq -r '.errors // empty' /tmp/cf_response.json)"
              failed=$((failed + 1))
            fi
          done <<< "$projects"

          if [ $failed -gt 0 ]; then
            echo ""
            echo "$failed project(s) failed to trigger."
            exit 1
          fi

          if [ $skipped -gt 0 ]; then
            echo ""
            echo "$skipped project(s) skipped (HTTP 304). Push a no-op commit to the affected client repo if the layouts change must roll out immediately."
          fi

          echo ""
          echo "All client sites queued for rebuild."
